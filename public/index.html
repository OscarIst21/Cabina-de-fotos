<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabina de Fotos Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <div id="flash-overlay" class="flash-overlay"></div>
        <aside class="sidebar">
            <header>
                <h1><i class="fas fa-camera-retro"></i> Cabina LO</h1>
            </header>

            <nav class="side-controls">
                <!-- Controles de Cámara -->
                <div id="camera-controls" class="control-section active">
                    <button id="capture-btn" class="btn primary full-width">
                        <i class="fas fa-camera"></i> Tomar Foto
                    </button>
                </div>

                <!-- Controles de Edición -->
                <div id="edit-controls" class="control-section">
                    <div class="drawing-config">
                        <div class="tool-item">
                            <label><i class="fas fa-palette"></i> Color</label>
                            <input type="color" id="color-picker" value="#ff0000">
                        </div>
                        <div class="tool-item">
                            <label><i class="fas fa-paint-brush"></i> Grosor</label>
                            <input type="range" id="brush-size" min="1" max="20" value="5">
                        </div>
                        <button id="clear-btn" class="btn secondary full-width">
                            <i class="fas fa-eraser"></i> Limpiar
                        </button>
                    </div>
                    
                    <div class="action-buttons">
                        <button id="retake-btn" class="btn danger full-width">
                            <i class="fas fa-undo"></i> Repetir
                        </button>
                        <button id="print-btn" class="btn success full-width">
                            <i class="fas fa-print"></i> Imprimir
                        </button>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="booth-display">
                <!-- Video en tiempo real -->
                <div id="camera-view" class="view-panel active">
                    <video id="video" autoplay playsinline></video>
                    <div id="countdown" class="countdown-overlay"></div>
                </div>

                <!-- Edición de foto -->
                <div id="edit-view" class="view-panel">
                    <div id="polaroid-frame" class="polaroid-container">
                        <canvas id="photo-canvas"></canvas>
                        <div class="polaroid-footer">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
